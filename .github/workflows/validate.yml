name: Validate Plugin Structure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5
        with:
          # Required by tests/validate-content.sh Check 19 sub-checks E + F
          # (SELF-CHECK.md body freshness vs git tag history). See issue #141.
          fetch-tags: true
          fetch-depth: 0
      - name: Validate structure and conventions
        run: bash tests/validate-structure.sh
      - name: Validate skill graph DAG
        run: bash tests/test-skill-graph.sh
      - name: Validate content quality and fitness functions
        run: bash tests/validate-content.sh
      - name: Verbosity hook regression test (8 branches + override + budget)
        run: bash tests/test-verbosity-hook.sh
      - name: Pre-commit hook F6 regression test (fail-closed verdict paths)
        run: bash tests/test-pre-commit-hook.sh
