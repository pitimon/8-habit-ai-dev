name: Wiki Link Check

# Validates links in docs/wiki/ on PRs to prevent broken links from reaching the published wiki.
# Uses lychee — fast Rust-based link checker.

on:
  pull_request:
    paths:
      - "docs/wiki/**"
      - ".github/workflows/wiki-linkcheck.yml"

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run lychee on docs/wiki/ (external HTTP links only)
        # Wiki-style links like [Home](Home) work on GitHub Wiki but cannot be
        # resolved as local files. Internal link integrity is enforced by
        # tests/validate-structure.sh Check 14 instead. Self-referential URLs
        # to main/ are excluded because they only resolve after merge.
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2
        with:
          args: >-
            --no-progress
            --verbose
            --max-concurrency 4
            --scheme https
            --scheme http
            --exclude '^https://github\.com/pitimon/8-habit-ai-dev/(blob|tree|raw)/main/'
            './docs/wiki/**/*.md'
          fail: true
