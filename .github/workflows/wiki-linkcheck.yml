name: Wiki Link Check

# Validates links in docs/wiki/ on PRs to prevent broken links from reaching the published wiki.
# Uses lychee — fast Rust-based link checker.

on:
  pull_request:
    paths:
      - "docs/wiki/**"
      - ".github/workflows/wiki-linkcheck.yml"

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run lychee on docs/wiki/
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --no-progress --verbose --max-concurrency 4 './docs/wiki/**/*.md'
          fail: true
