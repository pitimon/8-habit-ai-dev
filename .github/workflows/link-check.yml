name: Link Check

# Repo-wide markdown link validation. Catches dead external/cross-repo URLs
# (e.g., the GitHub links in docs/INTEGRATION.md that span the 3-plugin
# integration: pitimon/claude-governance, pitimon/devsecops-ai-team).
#
# Scope: external HTTP/HTTPS URLs across all *.md files outside docs/wiki/
# (wiki is covered by .github/workflows/wiki-linkcheck.yml with its own
# wiki-style link semantics). Internal markdown links (relative .md paths)
# are validated by tests/validate-content.sh Check 12b — out of scope here.
#
# Self-referential URLs are excluded for the same chicken-and-egg reason:
# `(blob|tree|raw)/main/` only resolves after PR merges, and `releases/tag/vX.Y.Z`
# only resolves after the release PR merges and the tag is pushed. Both would
# otherwise produce false-positives on every fresh release PR (the README badge
# points to the not-yet-existing release tag).
#
# Private cross-repo URLs are excluded — the workflow's GITHUB_TOKEN is scoped
# to this repo only and cannot authenticate against pitimon/memforge or
# pitimon/devsecops-ai-team (both private). These URLs are author-verified at
# write time; CI cannot re-verify them. claude-governance is public and IS
# checked (caught a real moved-doc bug pre-merge during dogfood).
#
# The root-level `plugin` directory is a real committed mirror for Codex
# marketplace compatibility (ADR-023; was a symlink until v2.21.10).
# Exclude it so link checking does not duplicate the entire repository through
# plugin/README.md, plugin/docs/..., etc.
#
# lychee treats --exclude-path values as regexes. Keep directory exclusions in
# (^|/)dir/ form rather than ./dir literals so they match normalized runner
# paths as well as repo-relative paths.
#
# Gartner newsroom links are excluded because they return 403 to GitHub-hosted
# link checkers while remaining human-readable in browsers.
#
# Issue: pitimon/8-habit-ai-dev#172

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/link-check.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/link-check.yml"

permissions:
  contents: read

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - name: Run lychee on repo markdown (excludes docs/wiki/ — already covered)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --no-progress
            --verbose
            --max-concurrency 4
            --scheme https
            --scheme http
            --exclude '^https://github\.com/pitimon/8-habit-ai-dev/(blob|tree|raw)/main/|^https://github\.com/pitimon/8-habit-ai-dev/releases/tag/'
            --exclude '^https://github\.com/pitimon/(memforge|devsecops-ai-team)(/|$)'
            --exclude '^https://www\.gartner\.com/en/newsroom/press-releases/'
            --exclude-path '(^|/)docs/wiki/'
            --exclude-path '(^|/)plugin/'
            --exclude-path '(^|/)\.claude/'
            --exclude-path '(^|/)\.codex/'
            --exclude-path '(^|/)deep-project/'
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
