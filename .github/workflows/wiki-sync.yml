name: Wiki Sync

# Publishes docs/wiki/ to the GitHub Wiki repository on push to main.
# Source of truth is docs/wiki/ — web-UI edits to the wiki are overwritten.
# See ADR-004 for rationale.

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
      - "habits/**"
      - "scripts/gen-habits-reference.sh"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Generate Habits-Reference.md from habits/
        run: bash scripts/gen-habits-reference.sh

      - name: Sync docs/wiki/ to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@1bbb4280446f9630e8e21a18012cbacf3b0f992e # v5.0.6
        with:
          path: docs/wiki/
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(wiki): sync from docs/wiki/ @ ${{ github.sha }}"
