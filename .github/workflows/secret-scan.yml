name: Secret Scan

# Continuous secret scanning (threat-model §5 gap D1, #361).
# The §4 scan was a manual one-off — point-in-time, not continuous assurance.
# fetch-depth: 0 so gitleaks scans FULL git history, covering the residual
# Medium "git-history secrets" risk (threat-model §3), not just the diff.
#
# gitleaks-action v3 requires GITLEAKS_LICENSE only for organization repos;
# this is a personal repo, so no license secret is needed. If the repo moves
# to an org, add GITLEAKS_LICENSE before the move or this job fails closed —
# which is the correct behavior (no silent skip; see rules on false success).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Run gitleaks (full history)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
